<style>
  html { scroll-behavior: smooth; }
  body { -webkit-font-smoothing: antialiased; }
  .label { font-family: "Mulish", sans-serif; text-transform: uppercase; letter-spacing: 0.22em; font-weight: 600; }
  .gallery-item { cursor: zoom-in; overflow: hidden; }
  .gallery-item img { transition: transform 0.5s cubic-bezier(.2,.8,.2,1); }
  .gallery-item:hover img { transform: scale(1.05); }
  /* Lightbox */
  #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 100; align-items: center; justify-content: center; }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 90vw; max-height: 88vh; object-fit: contain; border-radius: 2px; }
  #lb-close { position: absolute; top: 20px; right: 24px; color: #A89F97; font-size: 28px; cursor: pointer; line-height: 1; }
  #lb-close:hover { color: #E8E0D4; }
  #lb-prev, #lb-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.07); border: none; color: #A89F97; font-size: 24px; padding: 14px 18px; cursor: pointer; transition: background .2s; }
  #lb-prev:hover, #lb-next:hover { background: rgba(255,255,255,0.15); color: #E8E0D4; }
  #lb-prev { left: 16px; }
  #lb-next { right: 16px; }
  #lb-counter { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #A89F97; font-size: 12px; letter-spacing: 0.15em; font-family: "Mulish", sans-serif; text-transform: uppercase; }
</style>
</head>
<body class="bg-charcoal text-ink font-sans">

    <a href="index.html" class="label text-[10px] text-ink-soft hover:text-gold-soft transition-colors">← Back to Site</a>
    <img src="images/The pheasant logo.svg" alt="The Pheasant" class="h-10 md:h-14 w-auto"/>
    <a href="index.html#book" class="label text-[10px] text-gold-soft hover:text-gold transition-colors">Book a Table</a>

    </div>
    <div class="gallery-item rounded-lg break-inside-avoid" data-index="3">
      <img src="images/steak_peppercorn.jpeg" alt="Steak with peppercorn sauce" class="w-full rounded-lg object-cover"/>

    </div>
    <div class="gallery-item rounded-lg break-inside-avoid" data-index="5">
      <img src="images/seafood1.jpeg" alt="Seafood dish" class="w-full rounded-lg object-cover"/>
    </div>
    <div class="gallery-item rounded-lg break-inside-avoid" data-index="6">
      <img src="images/burger.jpeg" alt="Pheasant burger" class="w-full rounded-lg object-cover"/>
    </div>
    <div class="gallery-item rounded-lg break-inside-avoid" data-index="7">
      <img src="images/roast.jpeg" alt="Sunday roast" class="w-full rounded-lg object-cover"/>
    </div>
    <div class="gallery-item rounded-lg break-inside-avoid" data-index="8">
      <img src="images/fish_and_chips.jpeg" alt="Fish and chips" class="w-full rounded-lg object-cover"/>

</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span id="lb-close">&times;</span>
  <button id="lb-prev">&#8592;</button>
  <img id="lb-img" src="" alt=""/>
  <button id="lb-next">&#8594;</button>
  <div id="lb-counter"></div>
</div>

<!-- FOOTER CTA -->
<section class="bg-charcoal-deep border-t border-ink/10 py-14 text-center">
  <p class="label text-gold text-xs mb-4">Ready to dine?</p>
  <h2 class="font-serif text-4xl text-ink mb-6">Reserve your table</h2>
  <a href="index.html#book" class="inline-flex items-center bg-claret hover:bg-claret-deep text-cream label text-xs px-8 py-4 transition-colors">Book a Table →</a>
  <p class="text-ink-soft text-sm mt-5">Or call us on <a href="tel:02892638056" class="text-ink hover:text-gold-soft transition-colors">028 9263 8056</a></p>
</section>

<script>
  const items = document.querySelectorAll('.gallery-item');
  const images = Array.from(items).map(el => ({
    src: el.querySelector('img').src,
    alt: el.querySelector('img').alt
  }));
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCounter = document.getElementById('lb-counter');
  let current = 0;

  function openLightbox(index) {
    current = index;
    lbImg.src = images[current].src;
    lbImg.alt = images[current].alt;
    lbCounter.textContent = (current + 1) + ' / ' + images.length;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  function prev() { current = (current - 1 + images.length) % images.length; openLightbox(current); }
  function next() { current = (current + 1) % images.length; openLightbox(current); }

  items.forEach((item, i) => item.addEventListener('click', () => openLightbox(i)));
  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', prev);
  document.getElementById('lb-next').addEventListener('click', next);
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') prev();
    if (e.key === 'ArrowRight') next();
  });
</script>
</body>
</html>
